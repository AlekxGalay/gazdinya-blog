name: Notify on Build Failure

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    steps:
      - name: Send Telegram notification
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
        run: |
          RUN_URL="${{ github.event.workflow_run.html_url }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${COMMIT:0:7}"
          
          MESSAGE="❌ <b>GitHub Pages build failed!</b>%0A%0A          Repo: gazdinya-blog%0A          Commit: <code>${SHORT_SHA}</code>%0A          Run: ${RUN_URL}"
          
          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage"             -d chat_id="${CHAT_ID}"             -d text="${MESSAGE}"             -d parse_mode=HTML

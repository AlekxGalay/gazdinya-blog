---
layout: default
---
<!-- Breadcrumbs -->
<nav aria-label="Хлібні крихти" style="font-size:0.8rem;margin-bottom:16px;color:#a0a0b8;">
  <a href="{{ site.baseurl }}/" style="color:#7c5cfc;">Блог</a>
  → <span style="color:#a0a0b8;">{{ page.title }}</span>
</nav>

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

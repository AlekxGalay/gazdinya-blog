title: "Газдиня — AI для бізнесу"
description: "Блог про автоматизацію e-commerce з AI. Поради, кейси, статті з SEO, продажів та SMM для підприємців."
url: "https://alekxgalay.github.io"
baseurl: "/gazdinya-blog"
theme: minima
lang: uk
author: "Газдиня"
plugins:
  - jekyll-feed
  - jekyll-seo-tag

header_pages:
  - categories/seo.md
  - categories/sales.md
  - categories/smm.md
  - categories/automation.md
  - about.md

minima:
  social_links:
    - { platform: telegram, user_url: "https://t.me/Gazdinya_bot" }

footer_links:
  - title: "gazdinya.com"
    url: "https://gazdinya.com"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      category: "general"
